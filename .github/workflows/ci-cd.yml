name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Architecture guard
        run: pnpm architecture

      - name: Build
        run: pnpm build

  deploy:
    name: Build, publish, and deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ github.sha }}
      VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR || '/opt/kinora' }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup image name
        id: image
        run: echo "name=$(printf 'ghcr.io/%s' '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.name }}:latest

      - name: Validate required secrets
        run: |
          errors=0
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "ERROR: VPS_SSH_KEY secret is required."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            echo "ERROR: VPS_KNOWN_HOSTS secret is required."
            echo "Generate it with: ssh-keyscan -p <port> <host>"
            echo "Then store the output (pinned host key) as a GitHub secret."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.PRODUCTION_BASE_URL }}" ]; then
            echo "ERROR: PRODUCTION_BASE_URL secret is required (e.g. https://kinora.example.com)."
            errors=$((errors + 1))
          fi
          if [ "$errors" -gt 0 ]; then
            echo "One or more required secrets are missing. Configure them in GitHub repository settings."
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/kinora_vps
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/kinora_vps
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Copy source files to VPS
        run: |
          ssh -i ~/.ssh/kinora_vps -p "$VPS_PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '$VPS_DEPLOY_DIR'"
          scp -i ~/.ssh/kinora_vps -P "$VPS_PORT" \
            docker-compose.yml \
            package.json \
            pnpm-workspace.yaml \
            scripts/start-production.mjs \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:'$VPS_DEPLOY_DIR/'"

      - name: Deploy on VPS
        env:
          GHCR_IMAGE: ${{ steps.image.outputs.name }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build safe shell env script with printf %q to prevent injection.
          ENV_SCRIPT=$(printf 'export GHCR_IMAGE=%q\nexport IMAGE_TAG=%q\nexport GHCR_USER=%q\nexport GHCR_TOKEN=%q\nexport VPS_DEPLOY_DIR=%q\nexport PRODUCTION_BASE_URL=%q\n' \
            "$GHCR_IMAGE" "$IMAGE_TAG" "$GHCR_USER" "$GHCR_TOKEN" "$VPS_DEPLOY_DIR" "$PRODUCTION_BASE_URL")
          ENV_PAYLOAD=$(printf '%s' "$ENV_SCRIPT" | base64 -w0)

          ssh -i ~/.ssh/kinora_vps -p "$VPS_PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "ENV_PAYLOAD='$ENV_PAYLOAD' bash -s" <<'REMOTE'
          set -euo pipefail

          # Decode and source environment (base64 avoids shell injection through SSH command line)
          eval "$(printf '%s' "$ENV_PAYLOAD" | base64 -d)"

          cd "$VPS_DEPLOY_DIR"
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$GHCR_IMAGE:$IMAGE_TAG"

          export GHCR_IMAGE IMAGE_TAG
          docker compose up -d postgres

          echo "Waiting for PostgreSQL to be ready..."
          POSTGRES_USER="${POSTGRES_USER:-kinora}"
          POSTGRES_DB="${POSTGRES_DB:-kinora}"
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; then
              echo "PostgreSQL is ready after ${i} attempt(s)."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: PostgreSQL did not become ready within 30 attempts."
              docker compose logs --tail=20 postgres
              exit 1
            fi
            sleep 2
          done

          docker compose run --rm --no-deps \
            api pnpm --filter api db:migrate

          pnpm start

          curl --fail --silent --show-error --max-time 10 "$PRODUCTION_BASE_URL/health" >/dev/null
          curl --fail --silent --show-error --max-time 10 "$PRODUCTION_BASE_URL/api/health" >/dev/null
          REMOTE
