name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        # `pnpm test:e2e` runs scripts/e2e-with-stack.mjs, which starts an
        # ephemeral Postgres container (Docker on GitHub-hosted runners),
        # applies migrations, then boots the api + web dev servers via
        # Playwright's webServer array before running the specs. GitHub-hosted
        # ubuntu runners ship with Docker, so no extra setup is required here.
        run: pnpm test:e2e

      - name: Architecture guard
        run: pnpm architecture

      - name: UI → API guardrail
        run: pnpm ui-api-guard

      - name: Build
        run: pnpm build

  billing-integration:
    name: Billing integration (real Postgres)
    runs-on: ubuntu-latest
    # The three billing integration suites are gated behind
    # `describe.skipIf(!process.env.DATABASE_URL)` and never run in the hermetic
    # `ci` job. They guard CRITICAL billing invariants that a pure-fake unit
    # suite cannot reproduce (concurrent exactly-once consume + idempotent
    # replay, mid-period downgrade enforcement, atomic allocation+audit writes,
    # member-usage isolation). This job wires a real Postgres so `skipIf` does
    # NOT skip them and the invariants are gated on every PR and merge.
    services:
      postgres:
        # pgvector/pgvector:pg17 (not plain postgres:17): `db:migrate` applies
        # the full migration set, and 0010_vector_memory.sql runs
        # `CREATE EXTENSION vector`, which only exists in the pgvector image.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: kinora
          POSTGRES_USER: kinora
          POSTGRES_PASSWORD: kinora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kinora -d kinora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://kinora:kinora@localhost:5432/kinora
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter api db:migrate

      - name: Billing integration suites (real Postgres)
        # Target the three integration files directly so this job's purpose —
        # gating the billing invariants — is explicit. The `json` reporter emits
        # a machine-readable result file (into the runner temp dir, never the
        # tracked tree) consumed by the guard step below; the `default` reporter
        # keeps the human-readable output in the job log.
        run: >-
          pnpm --filter api exec vitest run
          --reporter=default --reporter=json
          --outputFile.json="$RUNNER_TEMP/billing-vitest-results.json"
          src/db/repositories/__tests__/billing-quota.integration.test.ts
          src/db/repositories/__tests__/billing-admin.integration.test.ts
          src/db/repositories/__tests__/billing-visibility.integration.test.ts

      - name: Assert billing suites executed (guard against false-green)
        # Each integration file pairs `describe.skipIf(!hasDb)` (the real tests)
        # with a `describe.skipIf(hasDb)` placeholder that passes trivially when
        # DATABASE_URL is absent. So if DATABASE_URL is ever dropped/renamed or
        # the service is unreachable, vitest runs ONLY the 3 placeholders, exits
        # 0, and the job goes GREEN having verified NONE of the billing
        # invariants. This guard fails the job RED unless the real suites
        # actually ran: a DB-present run yields 12 passed / 3 skipped, whereas a
        # DB-absent run yields only the 3 placeholders.
        run: >-
          node -e 'const r = require(process.argv[1]); const passed = r.numPassedTests ?? 0; const MIN = 12; if (passed < MIN) { console.error("ERROR: billing integration suites did NOT execute (numPassedTests=" + passed + " < " + MIN + "). DATABASE_URL was likely unset/unreachable, so vitest ran only the skip-placeholder tests and would have gone GREEN without verifying any billing invariant. Failing the job."); process.exit(1); } console.log("OK: billing integration suites executed (" + passed + " passed tests).");'
          "$RUNNER_TEMP/billing-vitest-results.json"

  docker-smoke:
    name: Docker build & boot smoke
    runs-on: ubuntu-latest
    needs: ci
    # PR-only gate: the production image is never built or booted on PRs
    # (build-image/deploy run only on push to main), so build- and
    # runtime-only regressions — a missing tool in the base image, a
    # workspace lib that only resolves under a bundler, a container that
    # crashes on boot — stayed invisible until merge. This reproduces the
    # deploy's build + boot so those failures surface on the PR instead.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker compose build

      - name: Start PostgreSQL
        # docker-compose.yml now pins pgvector/pgvector:pg17 so the 10b vector
        # migration can run CREATE EXTENSION vector in CI and smoke boot checks.
        run: docker compose up -d --wait postgres

      - name: Run database migrations
        run: docker compose run --rm --no-deps api pnpm --filter api db:migrate

      - name: Boot api and web, wait for health
        # --wait fails the step if api never becomes healthy (the boot crash
        # this gate exists to catch) or if web exits on startup.
        run: docker compose up -d --wait api web

      - name: Verify api /health responds
        run: docker compose exec -T api node -e "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-image:
    name: Build image (${{ matrix.platform }})
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup image name
        id: image
        run: echo "name=$(printf 'ghcr.io/%s' '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-image:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: build-image
    environment: prod
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.image.outputs.name }}
    steps:
      - name: Setup image name
        id: image
        run: echo "name=$(printf 'ghcr.io/%s' '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          cd ${{ runner.temp }}/digests
          docker buildx imagetools create \
            -t ${{ steps.image.outputs.name }}:${{ github.sha }} \
            -t ${{ steps.image.outputs.name }}:latest \
            $(printf '${{ steps.image.outputs.name }}@sha256:%s ' *)

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: merge-image
    environment: prod
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_TAG: ${{ github.sha }}
      VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR || '/opt/kinora' }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      WEB_PUBLIC_ORIGIN: ${{ secrets.WEB_PUBLIC_ORIGIN || secrets.PRODUCTION_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          errors=0
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "ERROR: VPS_SSH_KEY secret is required."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            echo "ERROR: VPS_KNOWN_HOSTS secret is required."
            echo "Generate it with: ssh-keyscan -p <port> <host>"
            echo "Then store the output (pinned host key) as a GitHub secret."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.WEB_PUBLIC_ORIGIN }}${{ secrets.PRODUCTION_BASE_URL }}" ]; then
            echo "ERROR: WEB_PUBLIC_ORIGIN (or PRODUCTION_BASE_URL as fallback) secret is required (e.g. https://kinora.example.com)."
            echo "The Google OAuth redirect URI is derived as <WEB_PUBLIC_ORIGIN>/callback/social."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.GOOGLE_CLIENT_ID }}" ]; then
            echo "ERROR: GOOGLE_CLIENT_ID secret is required for Google OAuth."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.GOOGLE_CLIENT_SECRET }}" ]; then
            echo "ERROR: GOOGLE_CLIENT_SECRET secret is required for Google OAuth."
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.API_BASE_URL }}" ]; then
            echo "ERROR: API_BASE_URL secret is required for the web→API proxy (e.g. https://kinora.aitsai.com/api)."
            errors=$((errors + 1))
          fi
          # NOTE: OPENROUTER_API_KEY, OPENROUTER_MODEL, LANGFUSE_PUBLIC_KEY,
          # LANGFUSE_SECRET_KEY, LANGFUSE_HOST are NOT GitHub secrets. They are
          # provided via a persistent .env file on the VPS ($VPS_DEPLOY_DIR/.env)
          # managed directly by the server operator. See .env.example and
          # apps/api/README.md for the required variables.
          if [ "$errors" -gt 0 ]; then
            echo "One or more required secrets are missing. Configure them in GitHub repository settings."
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/kinora_vps
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/kinora_vps
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Copy source files to VPS
        run: |
          ssh -i ~/.ssh/kinora_vps -p "$VPS_PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '$VPS_DEPLOY_DIR/scripts'"
          scp -i ~/.ssh/kinora_vps -P "$VPS_PORT" \
            docker-compose.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$VPS_DEPLOY_DIR/"
          scp -i ~/.ssh/kinora_vps -P "$VPS_PORT" \
            scripts/deploy.sh \
            scripts/restart.sh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$VPS_DEPLOY_DIR/scripts/"

      - name: Deploy on VPS
        env:
          GHCR_IMAGE: ${{ needs.merge-image.outputs.image_name }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          # Build safe shell env script with printf %q to prevent injection.
          # OPENROUTER_* and LANGFUSE_* are NOT included here — they are
          # sourced on the VPS from the operator-managed $VPS_DEPLOY_DIR/.env.
          ENV_SCRIPT=$(printf 'export GHCR_IMAGE=%q\nexport IMAGE_TAG=%q\nexport GHCR_USER=%q\nexport GHCR_TOKEN=%q\nexport VPS_DEPLOY_DIR=%q\nexport GOOGLE_CLIENT_ID=%q\nexport GOOGLE_CLIENT_SECRET=%q\nexport API_BASE_URL=%q\nexport WEB_PUBLIC_ORIGIN=%q\n' \
            "$GHCR_IMAGE" "$IMAGE_TAG" "$GHCR_USER" "$GHCR_TOKEN" "$VPS_DEPLOY_DIR" \
            "$GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" "$API_BASE_URL" \
            "$WEB_PUBLIC_ORIGIN")
          ENV_PAYLOAD=$(printf '%s' "$ENV_SCRIPT" | base64 -w0)

          ssh -i ~/.ssh/kinora_vps -p "$VPS_PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "ENV_PAYLOAD='$ENV_PAYLOAD' bash '$VPS_DEPLOY_DIR/scripts/deploy.sh'"
