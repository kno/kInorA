services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kinora}
      POSTGRES_USER: ${POSTGRES_USER:-kinora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kinora}
    # No ports — internal compose network only; api/web connect via service name
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${GHCR_IMAGE:-kinora}:${IMAGE_TAG:-local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-kinora}:${POSTGRES_PASSWORD:-kinora}@postgres:5432/${POSTGRES_DB:-kinora}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      WEB_PUBLIC_ORIGIN: ${WEB_PUBLIC_ORIGIN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      # Additional AI provider keys (09-ai-provider-admin).
      # Only the key for the currently-selected provider needs to be set.
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # 10b vector memory: embedding/runtime configuration must stay aligned with
      # the persisted pgvector rows (provider/model/version/dimension). Keep these
      # values stable per environment unless you are intentionally creating a new
      # compatible vector cohort and re-embedding data.
      VECTOR_MEMORY_EMBEDDING_PROVIDER: ${VECTOR_MEMORY_EMBEDDING_PROVIDER:-openai}
      VECTOR_MEMORY_EMBEDDING_MODEL: ${VECTOR_MEMORY_EMBEDDING_MODEL:-text-embedding-3-small}
      VECTOR_MEMORY_EMBEDDING_VERSION: ${VECTOR_MEMORY_EMBEDDING_VERSION:-text-embedding-3-small}
      VECTOR_MEMORY_EMBEDDING_DIMENSION: ${VECTOR_MEMORY_EMBEDDING_DIMENSION:-1536}
      VECTOR_MEMORY_EMBEDDING_TIMEOUT_MS: ${VECTOR_MEMORY_EMBEDDING_TIMEOUT_MS:-3000}
      VECTOR_MEMORY_EMBEDDING_MAX_ATTEMPTS: ${VECTOR_MEMORY_EMBEDDING_MAX_ATTEMPTS:-2}
      # Rollback boundary: Unset OPENAI_API_KEY to fail open for confirmed-memory
      # writes/retrieval while keeping the rest of the API online. Do NOT swap the
      # Postgres image back to plain postgres:* because 0010_vector_memory.sql runs
      # CREATE EXTENSION vector.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST}
    # No ports — web proxies /api/* through internal network
    command: ["pnpm", "--filter", "api", "start"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    image: ${GHCR_IMAGE:-kinora}:${IMAGE_TAG:-local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_BASE_URL: ${API_BASE_URL}
      WEB_PUBLIC_ORIGIN: ${WEB_PUBLIC_ORIGIN}
    # No ports — reverse proxy will expose it later
    command: ["pnpm", "--filter", "web", "start"]

volumes:
  postgres-data:
