<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%2309090C'/%3E%3Ccircle cx='24' cy='25' r='12.5' fill='none' stroke='%23696964' stroke-width='5'/%3E%3Ccircle cx='24' cy='11' r='8' fill='%23A8F060'/%3E%3C/svg%3E">
  <title>kInorA — Asistente de voz</title>
  <style>
/* ============================================================
   kInorA — shared design system
   Reconstructed from v0 chat `kinora-eOTftpCTxTX` (see DESIGN.md)
   Dark-only · near-black canvas · single lime accent
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

:root {
  /* surfaces */
  --bg:        oklch(5% 0.006 270);
  --surface:   oklch(11% 0.006 270);
  --surface-2: oklch(15% 0.006 270);
  --border:    oklch(24% 0.006 270);
  --fg:        oklch(96% 0.002 270);
  --muted:     oklch(66% 0.006 270);

  /* brand accent (lime) */
  --accent:    oklch(89% 0.20 128);
  --accent-fg: oklch(5% 0.006 270);
  --accent-dim: oklch(89% 0.20 128 / 0.12);

  /* states */
  --success: oklch(89% 0.20 128);
  --warning: oklch(84% 0.14 90);
  --danger:  oklch(68% 0.19 25);
  --info:    oklch(72% 0.13 250);

  /* type */
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body:    'DM Sans', -apple-system, system-ui, sans-serif;

  /* radii */
  --r-card: 18px;
  --r-btn: 12px;
  --r-pill: 999px;

  /* rhythm */
  --sp-1: 8px;  --sp-2: 12px; --sp-3: 16px;
  --sp-4: 24px; --sp-5: 32px; --sp-6: 48px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, h2, h3, h4, .display {
  font-family: var(--font-display);
  letter-spacing: -0.02em;
  line-height: 1.05;
  font-weight: 600;
}

.num { font-family: var(--font-display); font-variant-numeric: tabular-nums; }
.muted { color: var(--muted); }
.accent { color: var(--accent); }

a { color: inherit; text-decoration: none; }

/* ---- primitives ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  padding: var(--sp-4);
}
.card-2 { background: var(--surface-2); }

.btn {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--fg);
  border-radius: var(--r-btn);
  padding: 12px 20px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background .15s, border-color .15s, transform .05s;
}
.btn:hover { background: var(--border); }
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
}
.btn-primary:hover { filter: brightness(1.05); background: var(--accent); }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--surface-2); }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: var(--r-pill);
  border: 1px solid var(--border);
  color: var(--muted);
}
.pill-active {
  background: var(--accent-dim);
  border-color: transparent;
  color: var(--accent);
}

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; padding: 6px 12px;
  border-radius: var(--r-pill);
  background: var(--surface-2);
  border: 1px solid var(--border);
}

.eyebrow {
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}

.divider { height: 1px; background: var(--border); border: 0; }

.progress-track {
  height: 8px; border-radius: 999px;
  background: var(--surface-2);
  overflow: hidden;
}
.progress-fill { height: 100%; background: var(--accent); border-radius: 999px; }

::selection { background: var(--accent); color: var(--accent-fg); }

/* thin scrollbars on dark */
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
</style>
  <style>
    html, body {
      width: 390px;
      min-height: 844px;
      margin: 0 auto;
      overflow-x: hidden;
      background: var(--bg);
    }

    .screen {
      width: 390px;
      min-height: 844px;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg);
    }

    /* ---- Top bar ---- */
    .top-bar {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 4px;
      min-height: 44px;
      min-width: 44px;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--fg); }
    .back-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    .top-bar-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--r-pill);
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      transition: color .2s, border-color .2s, background .2s;
    }
    .status-badge.listening {
      color: var(--accent);
      border-color: oklch(89% 0.20 128 / 0.35);
      background: oklch(89% 0.20 128 / 0.07);
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .2s;
    }
    .status-badge.listening .status-dot {
      background: var(--accent);
      animation: blink-dot 1.2s ease-in-out infinite;
    }
    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ---- Orb area ---- */
    .orb-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      gap: 0;
      position: relative;
    }

    .orb-container {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    /* SVG orb with concentric rings */
    .orb-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Pulsing rings */
    .ring-1, .ring-2, .ring-3 {
      fill: none;
      stroke: var(--accent);
    }
    .ring-1 {
      opacity: 0;
      animation: ring-pulse 2.4s ease-out infinite;
    }
    .ring-2 {
      opacity: 0;
      animation: ring-pulse 2.4s ease-out 0.6s infinite;
    }
    .ring-3 {
      opacity: 0;
      animation: ring-pulse 2.4s ease-out 1.2s infinite;
    }

    @keyframes ring-pulse {
      0%   { r: 60px; stroke-width: 2px; opacity: 0.5; }
      70%  { r: 96px; stroke-width: 1px; opacity: 0.08; }
      100% { r: 100px; stroke-width: 0.5px; opacity: 0; }
    }

    /* Pause rings when not listening */
    .screen:not(.listening) .ring-1,
    .screen:not(.listening) .ring-2,
    .screen:not(.listening) .ring-3 {
      animation-play-state: paused;
    }
    .screen.listening .ring-1,
    .screen.listening .ring-2,
    .screen.listening .ring-3 {
      animation-play-state: running;
    }

    /* Waveform bars inside orb */
    .waveform {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .wave-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0.9;
      transform-origin: bottom center;
    }

    /* Default heights */
    .wave-bar:nth-child(1) { height: 14px; }
    .wave-bar:nth-child(2) { height: 24px; }
    .wave-bar:nth-child(3) { height: 36px; }
    .wave-bar:nth-child(4) { height: 48px; }
    .wave-bar:nth-child(5) { height: 36px; }
    .wave-bar:nth-child(6) { height: 52px; }
    .wave-bar:nth-child(7) { height: 28px; }
    .wave-bar:nth-child(8) { height: 40px; }
    .wave-bar:nth-child(9) { height: 20px; }

    /* Idle (not listening) - short and static */
    .screen:not(.listening) .wave-bar {
      opacity: 0.25;
      height: 6px !important;
    }

    /* Listening - animate */
    .screen.listening .wave-bar { opacity: 0.95; }
    .screen.listening .wave-bar:nth-child(1) { animation: wave 1.1s ease-in-out 0.0s infinite alternate; }
    .screen.listening .wave-bar:nth-child(2) { animation: wave 1.1s ease-in-out 0.12s infinite alternate; }
    .screen.listening .wave-bar:nth-child(3) { animation: wave 1.1s ease-in-out 0.24s infinite alternate; }
    .screen.listening .wave-bar:nth-child(4) { animation: wave 1.1s ease-in-out 0.36s infinite alternate; }
    .screen.listening .wave-bar:nth-child(5) { animation: wave 1.1s ease-in-out 0.48s infinite alternate; }
    .screen.listening .wave-bar:nth-child(6) { animation: wave 1.1s ease-in-out 0.20s infinite alternate; }
    .screen.listening .wave-bar:nth-child(7) { animation: wave 1.1s ease-in-out 0.44s infinite alternate; }
    .screen.listening .wave-bar:nth-child(8) { animation: wave 1.1s ease-in-out 0.08s infinite alternate; }
    .screen.listening .wave-bar:nth-child(9) { animation: wave 1.1s ease-in-out 0.56s infinite alternate; }

    @keyframes wave {
      0%   { transform: scaleY(0.3); }
      100% { transform: scaleY(1.0); }
    }

    /* Orb core circle bg */
    .orb-core {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow .4s;
    }
    .screen.listening .orb-core {
      box-shadow: 0 0 32px oklch(89% 0.20 128 / 0.14), 0 0 64px oklch(89% 0.20 128 / 0.06);
      border-color: oklch(89% 0.20 128 / 0.20);
    }

    /* ---- Transcript ---- */
    .transcript {
      width: 100%;
      max-width: 350px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .transcript-line {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .transcript-role {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--muted);
    }
    .transcript-role.coach { color: oklch(89% 0.20 128 / 0.7); }

    .transcript-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--fg);
      max-width: 100%;
    }
    .transcript-bubble.user {
      background: var(--surface-2);
      border-radius: 14px 14px 4px 14px;
      color: var(--muted);
      font-style: italic;
    }
    .transcript-bubble.coach {
      background: oklch(89% 0.20 128 / 0.06);
      border-color: oklch(89% 0.20 128 / 0.18);
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
      width: fit-content;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: typing-bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ---- Bottom controls ---- */
    .bottom-controls {
      padding: 24px 20px calc(24px + 16px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 20px;
    }

    .side-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      color: var(--muted);
    }
    .side-btn:hover { background: var(--surface-2); color: var(--fg); }
    .side-btn svg { width: 20px; height: 20px; }

    .mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: filter .15s, transform .08s, box-shadow .3s;
      box-shadow: 0 4px 20px oklch(89% 0.20 128 / 0.30);
      color: var(--accent-fg);
      flex-shrink: 0;
    }
    .mic-btn:hover { filter: brightness(1.07); }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn svg { width: 28px; height: 28px; }
    .mic-btn.active {
      box-shadow: 0 4px 28px oklch(89% 0.20 128 / 0.55), 0 0 0 6px oklch(89% 0.20 128 / 0.12);
      animation: mic-pulse 1.6s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 4px 28px oklch(89% 0.20 128 / 0.55), 0 0 0 6px oklch(89% 0.20 128 / 0.12); }
      50% { box-shadow: 0 4px 36px oklch(89% 0.20 128 / 0.65), 0 0 0 10px oklch(89% 0.20 128 / 0.06); }
    }

    .end-btn {
      color: var(--danger);
      border-color: oklch(68% 0.19 25 / 0.25);
    }
    .end-btn:hover {
      background: oklch(68% 0.19 25 / 0.1);
      border-color: oklch(68% 0.19 25 / 0.45);
      color: var(--danger);
    }

    /* Mic label */
    .mic-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-top: -12px;
      margin-bottom: 6px;
      transition: color .2s;
    }
    .screen.listening .mic-label { color: var(--accent); }

    .controls-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
<div class="screen" id="screen">

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back-btn" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <div class="top-bar-title">Asistente kInorA</div>
    <div class="status-badge" id="status-badge">
      <div class="status-dot"></div>
      <span id="status-text">Listo</span>
    </div>
  </div>

  <!-- Orb + Transcript -->
  <div class="orb-area">

    <!-- Voice orb -->
    <div class="orb-container">
      <!-- Concentric pulsing rings via SVG -->
      <svg class="orb-svg" viewBox="0 0 200 200">
        <circle class="ring-1" cx="100" cy="100" r="60"/>
        <circle class="ring-2" cx="100" cy="100" r="60"/>
        <circle class="ring-3" cx="100" cy="100" r="60"/>
      </svg>

      <!-- Core circle -->
      <div class="orb-core">
        <!-- Waveform bars -->
        <div class="waveform" id="waveform">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
      </div>
    </div>

    <!-- Transcript -->
    <div class="transcript">

      <div class="transcript-line">
        <div class="transcript-role">Tú</div>
        <div class="transcript-bubble user">
          "Sube el peso del press a 40 kilos"
        </div>
      </div>

      <div class="transcript-line">
        <div class="transcript-role coach">kInorA</div>
        <div class="transcript-bubble coach" id="coach-bubble">
          Hecho. Actualicé tu press de banca a 40 kg para la sesión de hoy. ¿Quieres ajustar también el número de repeticiones?
        </div>
      </div>

      <div class="typing-indicator" id="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>

    </div>

  </div><!-- /orb-area -->

  <!-- Bottom controls -->
  <div class="bottom-controls">

    <!-- Keyboard/text input -->
    <button class="side-btn" aria-label="Escribir mensaje">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M6 8h4M6 12h8M6 16h2M14 16h4"/>
      </svg>
    </button>

    <!-- Center column: mic + label -->
    <div class="controls-column">
      <div class="mic-label" id="mic-label">Mantener para hablar</div>
      <button class="mic-btn" id="mic-btn" aria-label="Activar micrófono" onclick="toggleListen()">
        <!-- Mic icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 013 3v7a3 3 0 01-6 0V5a3 3 0 013-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
    </div>

    <!-- End session -->
    <button class="side-btn end-btn" aria-label="Finalizar sesión">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7 2 2 0 011.72 2v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.42 19.42 0 013.43 9.64a19.79 19.79 0 01-3.07-8.7A2 2 0 012.33 0H5.5a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.47 7.91a16 16 0 006.21 5.4z"/>
        <line x1="23" y1="1" x2="1" y2="23"/>
      </svg>
    </button>

  </div>

</div>

<script>
  var isListening = false;

  function toggleListen() {
    isListening = !isListening;
    var screen = document.getElementById('screen');
    var micBtn = document.getElementById('mic-btn');
    var statusBadge = document.getElementById('status-badge');
    var statusText = document.getElementById('status-text');
    var micLabel = document.getElementById('mic-label');
    var typing = document.getElementById('typing');

    if (isListening) {
      screen.classList.add('listening');
      micBtn.classList.add('active');
      statusBadge.classList.add('listening');
      statusText.textContent = 'Escuchando';
      micLabel.textContent = 'Escuchando...';
      typing.classList.remove('visible');
    } else {
      screen.classList.remove('listening');
      micBtn.classList.remove('active');
      statusBadge.classList.remove('listening');
      statusText.textContent = 'Procesando';
      micLabel.textContent = 'Mantener para hablar';

      // Simulate processing, then show typing indicator
      setTimeout(function() {
        statusText.textContent = 'kInorA responde';
        typing.classList.add('visible');
        setTimeout(function() {
          typing.classList.remove('visible');
          statusText.textContent = 'Listo';
          statusBadge.classList.remove('listening');
        }, 2200);
      }, 600);
    }
  }
</script>
</body>
</html>
