# openspec/config.yaml
schema: spec-driven

context: |
  Monorepo (pnpm workspaces) — Next.js + TypeScript (web), Fastify + Node.js (API),
  PostgreSQL + Drizzle ORM, domain/contracts packages, and Vitest workspace tests.
  Clean Architecture boundaries are enforced with dependency-cruiser and deps-guard.
  Docker and GitHub Actions CI/CD are roadmap targets for 02-v1-infrastructure-ci-cd.
  Strict TDD is enabled by OpenSpec config and available test runners.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Relate each proposal to the README.md roadmap
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Cover edge cases: loading, empty, error, offline, validation
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Follow Clean Architecture layer boundaries
    - Security by design: validate at every boundary
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session (max ~200 LoC change)
  apply:
    - Follow existing code patterns where they exist
    tdd: true                # strict TDD: RED → GREEN → Triangle (edge cases)
    test_command: "pnpm --filter <workspace> test"
    build_command: "pnpm build"        # pre-commit/pre-PR gate per slice: `next build` catches
                                       # bundling errors (e.g. node:crypto in client code) that
                                       # test/type-check/architecture do NOT. MUST pass before commit.
  verify:
    test_command: "pnpm --filter <workspace> test"
    build_command: "pnpm build"        # MUST run and pass before merge (not just declared)
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  detected: "2026-06-21"
  note: "Vitest is installed for web, api, and domain workspaces; contracts currently has type-check only. No E2E, coverage, linter, or formatter command is configured yet."
  runner:
    command: "pnpm -r test"
    framework: "Vitest 3.2.4"
  layers:
    unit:
      available: true
      tool: "Vitest"
    integration:
      available: true
      tool: "Vitest API route/repository and cross-boundary tests"
    e2e:
      available: false
      tool: "Not configured"
  coverage:
    available: false
    command: "Not configured"
  quality:
    linter:
      available: false
      tool: "Not configured"
    type_checker:
      available: true
      tool: "pnpm type-check"
    formatter:
      available: false
      tool: "Not configured"
    architecture_guard:
      available: true
      tool: "pnpm architecture"
